# ── Servidor ────────────────────────────────────────────────
server.port=8080

# ── Base de datos MySQL ──────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/restaurante_db?useSSL=false&serverTimezone=America/Mexico_City&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ─────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── Jackson ─────────────────────────────────────────────────
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.default-property-inclusion=non_null
# camelCase en Java → snake_case en JSON (mesa_numero, producto_id, nota_cliente...)
spring.jackson.property-naming-strategy=SNAKE_CASE

# ── Logging ─────────────────────────────────────────────────
logging.level.com.restaurante=DEBUG
logging.level.org.springframework.security=DEBUG
